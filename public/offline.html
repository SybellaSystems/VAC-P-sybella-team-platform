<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAC-P offline</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 520px;
        padding: 2rem;
        border-radius: 24px;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }
      h1 { margin: 0 0 1rem; font-size: 1.8rem; }
      p { margin: 0.75rem 0; color: #475569; }
      a { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>VAC-P is offline</h1>
      <p>You're currently not connected to the network. This page is available while the app is offline.</p>
      <p>Once the network is restored, reload to continue working.</p>
      <p><a href="/">Reload the app</a></p>
    </div>
  </body>
</html>
